{{- define "main" }}
<div class="err-wrap">
  <div class="err-code">404</div>
  <h1 class="err-title">Page not found</h1>
  <p class="err-desc">
    The page you're looking for doesn't exist, has moved, or was never here.
  </p>
  <a href="/" class="err-btn">← Back to Home</a>
</div>

<style>
.err-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 55vh;
  text-align: center;
  padding: 3rem 1rem;
}

.err-code {
  font-size: clamp(5rem, 18vw, 9rem);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.05em;
  color: var(--border);
  margin-bottom: 1rem;
  font-variant-numeric: tabular-nums;
}

.err-title {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--primary);
  margin: 0 0 0.75rem;
  letter-spacing: -0.01em;
}

.err-desc {
  font-size: 0.9rem;
  color: var(--secondary);
  max-width: 360px;
  line-height: 1.6;
  margin: 0 0 2rem;
}

.err-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 0.6rem 1.25rem;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  color: var(--secondary);
  text-decoration: none;
  transition: border-color 0.15s, color 0.15s;
}

.err-btn:hover {
  border-color: #00d4aa;
  color: #00d4aa;
}
</style>
{{- end }}
